version: '3.8'

# Note: .env file is located in parent directory
# Run with: docker compose --env-file ../.env up

services:
  postgres:
    image: postgres:15
    container_name: db-o11y-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: super_awesome_application
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_logs:/var/log/postgresql
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    # entrypoint: ["/bin/sh", "-c", "chmod 777 /var/log/postgresql && exec docker-entrypoint.sh \"$@\"", "sh"]
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf", "-c", "shared_preload_libraries=pg_stat_statements", "-c", "track_activity_query_size=4096", "-c", "log_destination=stderr", "-c", "log_line_prefix=%m:%r:%u@%d:[%p]:%l:%e:%s:%v:%x:%c:%q%a:"]
    networks:
      - db-o11y-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: db-o11y-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - db-o11y-network

  alloy:
    image: grafana/alloy:v1.16.1
    container_name: db-o11y-alloy
    # user: "root"
    environment:
      - GCLOUD_PROMETHEUS_URL=${GCLOUD_PROMETHEUS_URL}
      - GCLOUD_PROMETHEUS_USERNAME=${GCLOUD_PROMETHEUS_USERNAME}
      - GCLOUD_PROMETHEUS_PASSWORD=${GCLOUD_PROMETHEUS_PASSWORD}
      - GCLOUD_LOKI_URL=${GCLOUD_LOKI_URL}
      - GCLOUD_LOKI_USERNAME=${GCLOUD_LOKI_USERNAME}
      - GCLOUD_LOKI_PASSWORD=${GCLOUD_LOKI_PASSWORD}
      - POSTGRES_DSN=${POSTGRES_DSN}
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      - postgres_logs:/var/log/postgresql:ro
      - alloy_data:/var/lib/alloy/data
    ports:
      - "12345:12345"
    command: run --server.http.listen-addr=0.0.0.0:12345 --stability.level=public-preview --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - postgres
    networks:
      - db-o11y-network

networks:
  db-o11y-network:
    driver: bridge

volumes:
  postgres_data:
  postgres_logs:
  alloy_data:
